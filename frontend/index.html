<!doctype html>
<html lang="en">

    <title>frontend</title>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        document.body.innerHTML = '<div style="color:white; padding: 20px; background: red;">' +
          '<h3>Runtime Error Detected:</h3>' +
          '<p>' + msg + '</p>' +
          '<p>Location: ' + url + ':' + lineNo + '</p>' +
          '</div>';
        return false;
      };
    </script>
